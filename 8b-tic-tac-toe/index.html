<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drei gewinnt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>❌⭕ Drei gewinnt</h1>
  <p id="text">X ist dran</p>
  <div id="brett">
    <button class="zelle" id="z0" onclick="setze(0)"></button>
    <button class="zelle" id="z1" onclick="setze(1)"></button>
    <button class="zelle" id="z2" onclick="setze(2)"></button>
    <button class="zelle" id="z3" onclick="setze(3)"></button>
    <button class="zelle" id="z4" onclick="setze(4)"></button>
    <button class="zelle" id="z5" onclick="setze(5)"></button>
    <button class="zelle" id="z6" onclick="setze(6)"></button>
    <button class="zelle" id="z7" onclick="setze(7)"></button>
    <button class="zelle" id="z8" onclick="setze(8)"></button>
  </div>
  <script src="script.js"></script>
  <hr style="max-width:640px;margin:2.5rem auto 1rem;border:none;border-top:2px solid #e0e7ff;">
  <details style="max-width:640px;margin:0 auto 1rem;text-align:left;">
    <summary style="cursor:pointer;font-weight:700;color:#4f46e5;font-size:1.1rem;">&#128203; Code anzeigen &amp; kopieren</summary>
    <p style="color:#475569;">Kopiere das in deine <b>script.js</b> in VS Code. Die Luecken (<code>...</code>) fuellst du selbst:</p>
    <button onclick="dcCopy()" style="background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:.5rem 1rem;font-size:1rem;cursor:pointer;">script.js kopieren</button>
    <pre id="dc-js" style="background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:10px;overflow:auto;font-size:.9rem;text-align:left;">laedt ...</pre>
    <p style="color:#475569;">Dateien herunterladen:
      <a href="index.html" download>index.html</a> &nbsp;&middot;&nbsp;
      <a href="styles.css" download>styles.css</a> &nbsp;&middot;&nbsp;
      <a href="script.js" download>script.js</a></p>
  </details>
  <script>
    fetch("script.js").then(function(r){return r.text();}).then(function(t){document.getElementById("dc-js").textContent=t;}).catch(function(){document.getElementById("dc-js").textContent="(oeffne script.js direkt)";});
    function dcCopy(){navigator.clipboard.writeText(document.getElementById("dc-js").textContent);}
  </script>
</body>
</html>
